    <script>

        function troque_img() 
            const tags_src = document.getElementsByTagName('img')

        console.log(tags_src);
        let tags_src_1 = tags_src[0]
        if (tags_src_1.title == "casa na arvore") {
            tags_src_1.src = "img/casanaarvore.jpg"
            tags_src_1.title = "casa na arvore"
            
        } else {
            tags_src_1.src = "img/cadadeurdinhos.jpg";
            tags_src_1.src = "Rosa"

        }
    </script>
